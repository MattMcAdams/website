---
label: Blog post
hide_body: false
fields:
- name: title
  type: text
  config:
    required: true
  label: Title
- name: publish_date
  type: datetime
  label: Publish date
  description: ''
  config:
    required: true
    date_format: 
    time_format: 
    display_utc: false
    export_format: MM/DD/YYYY
  default: now
- name: tags
  type: tag_list
  default: []
  label: Tags
- name: excerpt
  type: textarea
  default: ''
  config:
    required: false
    wysiwyg: true
    schema:
      format: markdown
  label: Excerpt
- name: layout
  type: select
  default: ''
  config:
    required: false
    options: []
    source:
      type: simple
      section: 
      file: 
      path: 
  label: Layout
- name: thumbnail
  type: file
  config:
    maxSize: 250
  label: Thumbnail
