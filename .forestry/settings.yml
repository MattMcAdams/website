---
new_page_extension: md
auto_deploy: false
admin_path: ".vuepress/public/admin"
webhook_url: 
sections:
- type: directory
  path: content/posts
  label: Blog Posts
  create: documents
  match: "**/*"
upload_dir: ''
public_path: https://assets.mattmcadams.com
front_matter_path: ''
use_front_matter_path: 
file_template: ":filename:"
build:
  preview_output_directory: src/.vuepress/dist
  install_dependencies_command: npm install
  preview_docker_image: node:10
  mount_path: "/srv"
  working_dir: "/srv"
  instant_preview_command: npm run site:dev
